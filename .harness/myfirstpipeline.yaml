pipeline:
  name: my-first-pipeline
  identifier: myfirstpipeline
  projectIdentifier: myfirstci
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: first_git
        repoName: Smallest-spring-boot-sample
        build: <+input>
  stages:
    - stage:
        name: Build
        identifier: Build
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: false
            override: false
            paths: []
          buildIntelligence:
            enabled: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Run Tests
                  identifier: Run_Tests
                  spec:
                    connectorRef: first_Docker
                    image: maven:3.9.6-eclipse-temurin-17
                    shell: Bash
                    command: cd /harness/SmallestSpringApp && mvn clean test
              - step:
                  type: Run
                  name: Code Quality - SonarQube
                  identifier: Code_Quality_SonarQube
                  spec:
                    connectorRef: first_Docker
                    image: sonarsource/sonar-scanner-cli:latest
                    shell: Sh
                    command: sh /harness/SmallestSpringApp/sonar.sh
                    envVariables:
                      SONAR_TOKEN: <+secrets.getValue("sonar_token")>
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and Push
                  identifier: Build_and_Push
                  spec:
                    connectorRef: first_Docker
                    repo: shankar1219/harness
                    tags:
                      - latest
                    caching: false
                    dockerfile: SmallestSpringApp/Dockerfile
                    context: SmallestSpringApp
              - step:
                  type: Run
                  name: Trivy Image Scan
                  identifier: Trivy_Image_Scan
                  spec:
                    connectorRef: first_Docker
                    image: aquasec/trivy:latest
                    shell: Sh
                    command: trivy image --exit-code 0 --severity HIGH,CRITICAL --no-progress shankar1219/harness:latest
    - stage:
        name: Deploy to Minikube
        identifier: Deploy_to_Minikube
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: springbootapp
          environment:
            environmentRef: minikubedev
            deployToAll: false
            infrastructureDefinitions:
              - identifier: minikubeinfra
          execution:
            steps:
              - step:
                  type: K8sCanaryDeploy
                  name: Canary Deployment
                  identifier: Canary_Deployment
                  spec:
                    skipDryRun: true
                    instanceSelection:
                      type: Count
                      spec:
                        count: 1
                  timeout: 10m
              - step:
                  type: K8sCanaryDelete
                  name: CanaryDelete
                  identifier: CanaryDelete
                  spec: {}
                  timeout: 10m
              - step:
                  type: K8sRollingDeploy
                  name: Full Rollout
                  identifier: Full_Rollout
                  spec:
                    skipDryRun: false
                    pruningEnabled: false
                  timeout: 10m
              - parallel:
                  - step:
                      type: K8sCanaryDelete
                      name: CanaryDelete1
                      identifier: CanaryDelete1
                      spec: {}
                      timeout: 10m
                  - step:
                      type: K8sRollingRollback
                      name: RollingRollback_1
                      identifier: K8sRollingRollback_1
                      spec:
                        pruningEnabled: false
                      timeout: 10m
            rollbackSteps:
              - step:
                  type: K8sRollingRollback
                  name: K8sRollingRollback_1
                  identifier: K8sRollingRollback_1
                  spec: {}
                  timeout: 10m
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
  notificationRules:
    - name: pipeline-email-notification
      identifier: pipelineemailnotification
      pipelineEvents:
        - type: PipelineSuccess
        - type: PipelineFailed
        - type: StageFailed
          forStages:
            - AllStages
      notificationMethod:
        type: Email
        spec:
          userGroups: []
          recipients:
            - shankarreddy.k3281@gmail.com
      enabled: true
