pipeline:
  name: my-first-pipeline
  identifier: myfirstpipeline
  projectIdentifier: myfirstci
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: first_git
        repoName: Smallest-spring-boot-sample
        build: <+input>
  stages:
    - stage:
        name: Build
        identifier: Build
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: false
            override: true
            paths: []
          buildIntelligence:
            enabled: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Run Tests
                  identifier: Run_Tests
                  spec:
                    shell: Bash
                    command: |-
                      #!/bin/bash
                      set -e
                      cd /harness/SmallestSpringApp
                      exec mvn clean test
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and Push
                  identifier: Build_and_Push
                  spec:
                    connectorRef: first_Docker
                    repo: shankar1219/harness
                    tags:
                      - latest
                    caching: false
                    dockerfile: SmallestSpringApp/Dockerfile
                    context: SmallestSpringApp
              - step:
                  type: Run
                  name: Trivy Image Scan
                  identifier: Trivy_Image_Scan
                  spec:
                    connectorRef: first_Docker
                    image: maven:3.9.6-eclipse-temurin-11
                    shell: Sh
              - step:
                  type: Run
                  name: Code Quality - SonarQube
                  identifier: Code_Quality_SonarQube
                  spec:
                    connectorRef: first_Docker
                    image: maven:3.9.6-eclipse-temurin-11
                    shell: Bash
                    command: |-
                      cd /harness/SmallestSpringApp
                      mvn sonar:sonar -Dsonar.projectKey=3492816ef74aade9d458eae103591fe4b54e5473 -Dsonar.organization=shankarreddy1219 -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=$SONAR_TOKEN
                    envVariables:
                      SONAR_TOKEN: <+secrets.getValue("sonar_token")>
