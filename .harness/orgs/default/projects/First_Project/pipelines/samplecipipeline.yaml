pipeline:
  name: sample-ci-pipeline
  identifier: samplecipipeline
  projectIdentifier: First_Project
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: org.github_connector
        build: <+input>
  stages:
    - stage:
        name: Build-stage
        identifier: Buildstage
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Run_1
                  identifier: Run_1
                  spec:
                    shell: Bash
                    command: |-
                      cd SmallestSpringApp
                      mvn -B clean package
                      mvn -B test
